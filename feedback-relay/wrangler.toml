name = "clips-studio-feedback"
main = "worker.js"
compatibility_date = "2026-01-01"

# Free Workers Logs — see live traffic/abuse with `npx wrangler tail`
# or the Cloudflare dashboard.
[observability]
enabled = true

[vars]
REPO = "ColinGPT9/clips-studio"

# Create the KV namespace once with:
#   npx wrangler kv namespace create FEEDBACK_KV
# then paste the id it prints here:
[[kv_namespaces]]
binding = "FEEDBACK_KV"
id = "PASTE_KV_NAMESPACE_ID_HERE"
