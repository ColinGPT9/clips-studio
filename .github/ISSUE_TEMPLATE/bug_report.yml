name: 🐞 Bug report
description: Something broke or looks wrong
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Tip: if you use Clips Studio, the in-app
        **💬 Feedback** button on the Dashboard files this for you and
        attaches your versions/hardware/log automatically.
  - type: textarea
    id: trying
    attributes:
      label: What were you trying to do?
    validations:
      required: true
  - type: textarea
    id: happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
  - type: dropdown
    id: repro
    attributes:
      label: Can you make it happen again?
      options: [Always, Sometimes, Only once]
  - type: dropdown
    id: severity
    attributes:
      label: How serious is it?
      options: [Low — cosmetic, Medium, High — blocks my work, Critical — app unusable]
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: |
        App version, Windows version, GPU, AI model (e.g. gemma:7b, Q4, Ollama 0.x),
        FFmpeg version — the in-app Feedback button collects all of this automatically.
      render: text
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
